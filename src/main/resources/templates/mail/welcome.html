<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoş Geldiniz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .wrapper { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 40px 32px; text-align: center; }
        .header h1 { color: #fff; font-size: 24px; font-weight: 700; }
        .header span { color: #10b981; }
        .hero { padding: 40px 32px 24px; text-align: center; }
        .hero-emoji { font-size: 56px; margin-bottom: 16px; }
        .hero h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
        .hero p { color: #64748b; font-size: 15px; }
        .body { padding: 0 32px 40px; }
        .text { color: #64748b; font-size: 15px; line-height: 1.7; margin-bottom: 24px; }
        .btn-wrapper { text-align: center; margin: 32px 0; }
        .btn { display: inline-block; background: linear-gradient(135deg, #10b981, #059669); color: #fff; text-decoration: none; padding: 14px 36px; border-radius: 8px; font-weight: 600; font-size: 15px; }
        .footer { background: #f8fafc; padding: 24px 32px; text-align: center; border-top: 1px solid #e2e8f0; }
        .footer p { color: #94a3b8; font-size: 12px; line-height: 1.6; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1><span th:text="${appName}">Sinay</span></h1>
    </div>
    <div class="hero">
        <div class="hero-emoji">🎉</div>
        <h2>Hoş Geldiniz, <span th:text="${name}">Kullanıcı</span>!</h2>
        <p>Hesabınız başarıyla doğrulandı.</p>
    </div>
    <div class="body">
        <p class="text">
            Artık hesabınıza giriş yapabilir ve tüm özellikleri kullanabilirsiniz.
            Herhangi bir sorunuz olursa destek ekibimizle iletişime geçmekten çekinmeyin.
        </p>
        <div class="btn-wrapper">
            <a th:href="${loginUrl}" class="btn">Giriş Yap</a>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2024 <span th:text="${appName}">Sinay</span>. Tüm hakları saklıdır.</p>
    </div>
</div>
</body>
</html>
